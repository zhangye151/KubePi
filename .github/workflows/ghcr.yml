name: Build and Push to GHCR

on:
  workflow_dispatch:
      
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 登录 GHCR（自动用 GITHUB_TOKEN）
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ✅ 构建镜像（关键：加 npm 加速参数）
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NPM_REGISTRY=https://registry.npmmirror.com \
            -t ghcr.io/${{ github.repository_owner }}/kubepi:latest .

      # ✅ 推送镜像
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/kubepi:latest
